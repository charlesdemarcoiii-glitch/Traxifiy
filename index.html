  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, getDoc, setDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyBIB1f69foJb4Svw15T4yv8KV4uzjC66_M",
      authDomain:        "traxify-45545.firebaseapp.com",
      projectId:         "traxify-45545",
      storageBucket:     "traxify-45545.firebasestorage.app",
      messagingSenderId: "341961978716",
      appId:             "1:341961978716:web:efca65de5f8a80f44e4799"
    };
    // ─────────────────────────────────────────────────────────────────────────

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db   = getFirestore(firebaseApp);

    window._signIn  = (e,p) => signInWithEmailAndPassword(auth,e,p);
    window._signUp  = (e,p) => createUserWithEmailAndPassword(auth,e,p);
    window._resetPw = (e)   => sendPasswordResetEmail(auth,e);
    window._signOut = ()    => signOut(auth);
    window._onAuth  = (cb)  => onAuthStateChanged(auth,cb);

    window._getDoc = async (path,id) => {
      const snap = await getDoc(doc(db,path,id));
      return snap.exists() ? {_id:snap.id,...snap.data()} : null;
    };
    window._setDoc    = async (path,id,data) => { await setDoc(doc(db,path,id),data); };
    window._addDoc    = async (path,data)     => { const r=await addDoc(collection(db,path),data); return r.id; };
    window._updateDoc = async (path,id,data)  => { await updateDoc(doc(db,path,id),data); };
    window._getAll    = async (path)          => {
      const snap = await getDocs(collection(db,path));
      const res=[]; snap.forEach(d=>res.push({_id:d.id,...d.data()})); return res;
    };

    window._firebaseReady = true;
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#07090f;--surface:#0d1118;--surface2:#131c28;--border:#1e2d3d;
      --primary:#0d9488;--primary-h:#0f766e;--primary-glow:rgba(13,148,136,.15);
      --text:#e2e8f0;--dim:#94a3b8;--muted:#64748b;
      --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--blue:#0ea5e9;
      --r:12px;--r-sm:8px;
    }
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
    input,select,button,textarea{font-family:inherit;font-size:15px}
    input,select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:11px 14px;width:100%}
    input:focus,select:focus{outline:2px solid var(--primary);outline-offset:2px}
    input::placeholder{color:var(--muted)}
    button{cursor:pointer;touch-action:manipulation}

    /* ── AUTH SCREENS ── */
    .auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px 56px}
    .auth-card{width:100%;max-width:400px}
    .logo{display:flex;align-items:center;gap:11px;margin-bottom:32px}
    .logo-mark{width:42px;height:42px;background:var(--primary);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .logo-word{font-size:26px;font-weight:800;letter-spacing:-.8px;color:var(--text)}
    .logo-word em{font-style:normal;color:var(--primary)}
    .a-title{font-size:22px;font-weight:700;margin-bottom:6px}
    .a-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.55}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
    .btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;display:block;text-align:center;transition:opacity .15s,transform .1s}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn+.btn{margin-top:10px}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover:not(:disabled){background:var(--primary-h)}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
    .btn-amber{background:var(--amber);color:#000}
    .btn-red{background:var(--red);color:#fff}
    .btn-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff}
    .btn-blue{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff}
    .link-row{text-align:center;margin-top:18px;font-size:14px;color:var(--muted)}
    .link-row a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}
    .choice-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;margin-bottom:12px;transition:border-color .15s,background .15s}
    .choice-card:hover{border-color:var(--primary);background:var(--primary-glow)}
    .choice-icon{font-size:26px;margin-bottom:8px}

    .choice-sub{font-size:13px;color:var(--muted);line-height:1.4}
    .invite-banner{background:var(--primary-glow);border:1px solid var(--primary);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--primary);font-weight:600;line-height:1.4}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}

    /* ── MAIN APP ── */
    .page{min-height:100vh;background:var(--bg);padding-bottom:80px}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

    .card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px}
    .label{color:var(--dim);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}

    .action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}

    .action-btn:hover{border-color:var(--primary);background:var(--primary-glow)}
    .action-btn .ab-icon{font-size:22px}
    .action-btn .ab-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;text-align:center}

    /* bottom tabs */
    .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}

    /* items */
    .item-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color .15s}
    .item-row:hover{border-color:var(--primary)}
    .item-name{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px}
    .item-meta{font-size:12px;color:var(--muted)}
    .status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
    .status-active{background:rgba(34,197,94,.15);color:#22c55e}
    .status-used{background:rgba(245,158,11,.15);color:#f59e0b}
    .status-transit{background:rgba(139,92,246,.15);color:#8b5cf6}
    .status-expired{background:rgba(239,68,68,.15);color:#ef4444}

    /* overlay / modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:500}
    .overlay-inner{width:100%;max-width:480px;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 48px;border:1px solid var(--border);max-height:85vh;overflow-y:auto;position:relative}
    .overlay-center{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:4px}

    /* scanner */
    .scan-page{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .scan-video{width:100%;max-height:60vh;object-fit:cover}
    .scan-canvas{display:none}
    .scan-status{color:#fff;font-size:14px;font-weight:600;margin:12px 0;text-align:center;padding:0 20px}
    .scan-hint{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:12px;text-align:center}
    .scan-manual{width:100%;max-width:340px;padding:0 20px}
    .scan-manual input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--r-sm);padding:12px 14px;width:100%}
    .scan-manual input::placeholder{color:rgba(255,255,255,.4)}
    .scan-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;border-radius:8px;padding:8px 12px;cursor:pointer}

    /* toast */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);padding:13px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:9999;max-width:88vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none}

    .search-wrap{position:relative;margin-bottom:12px}

    /* log */
    .log-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}

    .settings-row:hover{border-color:var(--primary)}
    .settings-label{font-size:14px;font-weight:600}

    @media print{body *{visibility:hidden}#print-area,#print-area *{visibility:visible}#print-area{position:absolute;left:0;top:0;padding:20px;text-align:center}}

<body>
<div id="app"></div>
<div id="print-area" style="display:none"></div>

<script>
// ── FIREBASE WAIT ─────────────────────────────────────────────────────────────
async function waitForFirebase(){
  let t=0;
  while(!window._firebaseReady&&t<100){await new Promise(r=>setTimeout(r,100));t++;}
  if(!window._firebaseReady)throw new Error("Firebase failed to load");
}

// ── DATE HELPER ───────────────────────────────────────────────────────────────
function formatDate(ts){
  if(!ts)return"";
  try{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Date(ts).toLocaleString("en-US",{timeZone:tz,month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
  }catch(e){return ts;}
}

// ── TENANT-SCOPED FIRESTORE HELPERS ──────────────────────────────────────────
function tCol(col){return`tenants/${S.profile.tenantId}/${col}`;}

async function getItems()  {return window._getAll(tCol("items"));}
async function getOwners() {return window._getAll(tCol("owners"));}
async function getLog()    {return window._getAll(tCol("log"));}
async function getOrders() {return window._getAll(tCol("orders"));}
async function getTenantUsers(){return window._getAll(tCol("users"));}

async function addItem(item)              {await window._setDoc(tCol("items"),item.barcode,item);}
async function updateItem(barcode,data)   {await window._updateDoc(tCol("items"),barcode,data);}
async function addLog(entry)              {await window._addDoc(tCol("log"),entry);}
async function addOrder(order)            {await window._setDoc(tCol("orders"),order.id,order);}
async function updateOrder(id,data)       {await window._updateDoc(tCol("orders"),id,data);}

// ── STATE ─────────────────────────────────────────────────────────────────────
const S={
  // Auth state
  screen:"loading",          // loading|login|signup|forgot|org-setup|create-org|join-org|app
  user:null,                 // Firebase Auth user
  profile:null,              // /users/{uid}
  tenant:null,               // /tenants/{tenantId}
  inviteCode:null,
  inviteData:null,

  // App state
  tab:"dashboard",
  owners:[],items:[],log:[],orders:[],tenantUsers:[],
  loading:false,
  toast:null,toastTimer:null,
  inventorySearch:"",
  selectedOwner:null,
  modal:null,
  scanning:false,scanMode:null,scanHint:"",

  // Multi-scan
  multiMode:false,
  multiDetails:null,
  multiCodes:[],
  showMultiDetails:false,
  showMultiScan:false,
  showMultiConfirm:false,

  // Orders
  activeOrder:null,
  orderItems:[],
  showOrderItemScan:false,
  showOrderQRScan:false,
  showOrderSummary:false,
  pendingOrderQR:null,
};

function setState(u){Object.assign(S,u);render();}
function showToast(msg,type="ok"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  const t=setTimeout(()=>setState({toast:null,toastTimer:null}),3500);
  setState({toast:{msg,type},toastTimer:t});
}

// ── DATA LOAD ─────────────────────────────────────────────────────────────────
async function loadData(){
  setState({loading:true});
  try{
    const [oR,iR,lR,ordR,uR]=await Promise.allSettled([getOwners(),getItems(),getLog(),getOrders(),getTenantUsers()]);
    const owners = oR.status==="fulfilled"?oR.value:S.owners;
    const items  = iR.status==="fulfilled"?iR.value:S.items;
    const log    = lR.status==="fulfilled"?lR.value:S.log;
    const orders = ordR.status==="fulfilled"?ordR.value:S.orders;
    const tenantUsers = uR.status==="fulfilled"?uR.value:S.tenantUsers;
    setState({
      owners:owners.map(o=>({id:o._id||o.id,name:o.name,type:o.type})),
      items:items.map(i=>({barcode:i._id||i.barcode,name:i.name,type:i.type,expDate:i.expDate||"",ownerId:i.ownerId,status:i.status||"active",addedAt:i.addedAt,usedBy:i.usedBy||""})),
      log:log.map(l=>({ts:l.ts,action:l.action,barcode:l.barcode,itemName:l.itemName,from:l.from,to:l.to,user:l.user})).sort((a,b)=>new Date(b.ts)-new Date(a.ts)),
      orders:orders.map(o=>({id:o._id||o.id,name:o.name,count:o.count,createdBy:o.createdBy,createdAt:o.createdAt,status:o.status,items:o.items||""})),
      tenantUsers:tenantUsers.map(u=>({uid:u._id,displayName:u.displayName,email:u.email,role:u.role,ownerId:u.ownerId})),
      loading:false
    });
  }catch(e){console.error("Load failed:",e);showToast("Could not load data","err");setState({loading:false});}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function submitCheckin(barcode,name,type,expDate,ownerId){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===ownerId)?.name||ownerId;
  const newItem={barcode,name,type,expDate,ownerId,status:"active",addedAt:now,usedBy:""};
  setState({items:[...S.items,newItem]});
  addItem(newItem);
  addLog({ts:now,action:"CHECK_IN",barcode,itemName:name,from:S.activeOrder?S.activeOrder.id:"",to:ownerName,user:S.profile.displayName});
}

async function submitMultiCheckin(){
  const {multiDetails,multiCodes,profile,owners,activeOrder}=S;
  setState({loading:true,showMultiConfirm:false});
  const pool=owners.find(o=>o.id.toUpperCase()==="POOL")||owners[0];
  const now=new Date().toISOString();
  try{
    for(const barcode of multiCodes){
      await addItem({barcode,name:multiDetails.name,type:multiDetails.type,expDate:multiDetails.expDate,ownerId:pool.id,status:"active",addedAt:now,usedBy:""});
      await addLog({ts:now,action:"CHECK_IN",barcode,itemName:multiDetails.name,from:"",to:pool.name,user:profile.displayName});
    }
    showToast(`✅ ${multiCodes.length} items checked in to ${pool.name}`);
    setState({multiMode:false,multiDetails:null,multiCodes:[],showMultiDetails:false,showMultiScan:false,showMultiConfirm:false,loading:false,scanning:false});
  }catch(e){showToast("Multi-checkin failed: "+e.message,"err");setState({loading:false});}
}

async function submitCheckout(item,usedBy){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,status:"used",usedBy}:i);
  setState({items:updatedItems});
  showToast("📤 "+item.name+" checked out");
  updateItem(item.barcode,{status:"used",usedBy})
    .then(()=>addLog({ts:now,action:"CHECK_OUT",barcode:item.barcode,itemName:item.name,from:ownerName,to:usedBy,user:S.profile.displayName}))
    .catch(e=>showToast("Failed: "+e.message,"err"));
}

async function submitUndoCheckout(item){
  const now=new Date().toISOString();
  const itemLog=S.log.filter(l=>l.barcode===item.barcode);
  const checkoutEntry=itemLog.find(l=>l.action==="CHECK_OUT");
  let returnOwner=null;
  if(checkoutEntry&&checkoutEntry.from){
    const fromVal=checkoutEntry.from.trim().toLowerCase();
    returnOwner=S.owners.find(o=>o.name.trim().toLowerCase()===fromVal||o.id.trim().toLowerCase()===fromVal);
  }
  if(!returnOwner)returnOwner=S.owners.find(o=>o.id.toUpperCase()==="POOL")||S.owners[0];
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,status:"active",ownerId:returnOwner.id,usedBy:""}:i);
  setState({items:updatedItems});
  showToast("↩️ "+item.name+" returned to "+returnOwner.name);
  updateItem(item.barcode,{status:"active",ownerId:returnOwner.id,usedBy:""})
    .then(()=>addLog({ts:now,action:"UNDO_CHECKOUT",barcode:item.barcode,itemName:item.name,from:"USED",to:returnOwner.name,user:S.profile.displayName}))
    .catch(e=>showToast("Failed: "+e.message,"err"));
}

async function submitTransfer(item,toOwnerId){
  const now=new Date().toISOString();
  const fromName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const toName=S.owners.find(o=>o.id===toOwnerId)?.name||toOwnerId;
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,ownerId:toOwnerId}:i);
  setState({items:updatedItems});
  showToast("🔄 "+item.name+" transferred to "+toName);
  updateItem(item.barcode,{ownerId:toOwnerId})
    .then(()=>addLog({ts:now,action:"TRANSFER",barcode:item.barcode,itemName:item.name,from:fromName,to:toName,user:S.profile.displayName}))
    .catch(e=>showToast("Failed: "+e.message,"err"));
}

async function submitReceiveOrder(order,barcodes,toOwnerId){
  const now=new Date().toISOString();
  const toOwner=S.owners.find(o=>o.id===toOwnerId)||S.owners[0];
  setState({loading:true});
  try{
    for(const barcode of barcodes){
      await updateItem(barcode,{ownerId:toOwnerId,status:"active"});
      await addLog({ts:now,action:"ORDER_IN",barcode,itemName:S.items.find(i=>i.barcode===barcode)?.name||barcode,from:"TRANSIT",to:toOwner.name,user:S.profile.displayName});
    }
    await updateOrder(order.id,{status:"received"});
    showToast(`📦 Order received — ${barcodes.length} items to ${toOwner.name}`);
    setState({loading:false,modal:null});
    loadData();
  }catch(e){showToast("Failed: "+e.message,"err");setState({loading:false});}
}

async function submitCreateOrder(orderName,orderItems,orderQR){
  const now=new Date().toISOString();
  setState({loading:true});
  try{
    await addOrder({id:orderQR,name:orderName,count:orderItems.length,createdBy:S.profile.displayName,createdAt:now,status:"pending",items:orderItems.join(",")});
    for(const barcode of orderItems){
      await updateItem(barcode,{status:"transit"});
      await addLog({ts:now,action:"ORDER_OUT",barcode,itemName:S.items.find(i=>i.barcode===barcode)?.name||barcode,from:S.owners.find(o=>o.id===S.items.find(i=>i.barcode===barcode)?.ownerId)?.name||"",to:"TRANSIT",user:S.profile.displayName});
    }
    showToast(`🚚 Order "${orderName}" created — ${orderItems.length} items in transit`);
    setState({loading:false,showOrderSummary:false,orderItems:[],pendingOrderQR:null,showOrderItemScan:false,showOrderQRScan:false,activeOrder:null});
    loadData();
  }catch(e){showToast("Failed: "+e.message,"err");setState({loading:false});}
}

// ── SCANNER ───────────────────────────────────────────────────────────────────
let scanStream=null,scanInterval=null;
function startScanner(){
  const video=document.getElementById("scan-video");
  const canvas=document.getElementById("scan-canvas");
  const status=document.getElementById("scan-status");
  if(!video||!canvas)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}})
    .then(stream=>{
      scanStream=stream;video.srcObject=stream;video.play();
      if(window.jsQR){
        if(status)status.textContent=S.scanHint||"Point camera at QR code";
        scanInterval=setInterval(()=>{
          if(video.readyState!==4)return;
          const size=Math.min(video.videoWidth,video.videoHeight)*.8;
          const x=(video.videoWidth-size)/2,y=(video.videoHeight-size)/2;
          canvas.width=size;canvas.height=size;
          const ctx=canvas.getContext("2d");
          ctx.drawImage(video,x,y,size,size,0,0,size,size);
          const img=ctx.getImageData(0,0,size,size);
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
          if(code&&code.data)handleScan(code.data);
        },150);
      }else{if(status)status.textContent="Type code below";}
    })
    .catch(()=>{const s=document.getElementById("scan-status");if(s)s.textContent="Camera unavailable — type code below";});
}
function stopScanner(){
  clearInterval(scanInterval);scanInterval=null;
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
}

function handleScan(barcode){
  const {items,scanMode,activeOrder,multiCodes,showMultiScan,showOrderItemScan,showOrderQRScan}=S;
  if(showOrderItemScan){
    const item=items.find(i=>i.barcode===barcode);
    if(item){
      if(item.status==="used"){showToast("Already used","warn");setState({scanning:true});return;}
      if(item.status==="transit"){showToast("In transit","warn");setState({scanning:true});return;}
      if(S.orderItems.includes(barcode)){showToast("Already added","warn");setState({scanning:true});return;}
      const newItems=[...S.orderItems,barcode];
      setState({orderItems:newItems,scanning:true});
      showToast("📦 "+newItems.length+" item"+(newItems.length>1?"s":"")+" added");
    }else{showToast("Item not found","err");setState({scanning:true});}
    return;
  }
  if(showOrderQRScan){
    if(S.orders.find(o=>o.id===barcode)){showToast("Already an order","err");setState({scanning:true});return;}
    const existing=items.find(i=>i.barcode===barcode);
    if(existing&&existing.status==="active"&&!S.orderItems.includes(barcode)){showToast("Belongs to an active item","warn");setState({scanning:true});return;}
    setState({scanning:false,showOrderQRScan:false,pendingOrderQR:barcode,showOrderSummary:true});
    return;
  }
  if(showMultiScan){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked","warn");setState({scanning:true});return;}
    if(multiCodes.includes(barcode)){showToast("Already scanned","warn");setState({scanning:true});return;}
    const newCodes=[...multiCodes,barcode];
    setState({multiCodes:newCodes,scanning:true});
    showToast(`📦 Code ${newCodes.length} scanned`);
    return;
  }
  setState({scanning:false});
  if(scanMode==="order"&&!activeOrder){
    const order=S.orders.find(o=>o.id===barcode);
    if(!order){showToast("Order not found","err");return;}
    setState({activeOrder:order,scanning:true,scanHint:"Scan items to add to order"});
    showToast(`📦 Order: ${order.name}`);
    return;
  }
  if(scanMode==="order"&&activeOrder){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked","warn");setState({scanning:true});return;}
    setState({modal:{type:"checkin",barcode,orderMode:true}});return;
  }
  if(scanMode==="checkin"){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked","warn");return;}
    setState({modal:{type:"checkin",barcode,orderMode:false}});return;
  }
  if(scanMode==="checkout"){
    const item=items.find(i=>i.barcode===barcode);
    if(!item){showToast("Item not found","err");return;}
    if(item.status==="used"){showToast("Already checked out","warn");return;}
    if(S.profile.role!=="admin"&&item.ownerId!==S.profile.ownerId){showToast("Not in your inventory","err");return;}
    setState({modal:{type:"checkout",item}});return;
  }
  if(scanMode==="transfer"){
    const order=S.orders.find(o=>o.id===barcode);
    if(order){
      if(order.status==="received"){showToast("Already received","warn");return;}
      const barcodes=(order.items||"").split(",").filter(b=>b.trim());
      if(barcodes.length===0){showToast("Order has no items","warn");return;}
      setState({modal:{type:"receive_order",order,barcodes,toOwnerId:S.profile.role==="admin"?"":S.profile.ownerId}});
      return;
    }
    const item=items.find(i=>i.barcode===barcode);
    if(!item){showToast("Item not found","err");return;}
    if(item.status==="used"){showToast("Already used","warn");return;}
    if(item.status==="transit"){showToast("In transit — receive order instead","warn");return;}
    if(S.profile.role!=="admin"&&item.ownerId===S.profile.ownerId){showToast("Already in your inventory","warn");return;}
    setState({modal:{type:"transfer",item}});
  }
}

// ── EL HELPER ─────────────────────────────────────────────────────────────────
function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="onclick")e.onclick=v;
    else if(k==="onchange")e.onchange=v;
    else if(k==="oninput")e.oninput=v;
    else if(k==="onkeydown")e.onkeydown=v;
    else if(k==="style")Object.assign(e.style,v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function appendHTML(parent,html){const d=document.createElement("div");d.innerHTML=html;while(d.firstChild)parent.appendChild(d.firstChild);}
function makeScreen(){const s=document.createElement("div");s.className="auth-screen";const c=document.createElement("div");c.className="auth-card";s.appendChild(c);return{screen:s,card:c};}

function renderDashboard(content){
  const{items,owners,log,orders,profile}=S;
  const myItems=profile.role==="admin"?items:items.filter(i=>i.ownerId===profile.ownerId);
  const active=myItems.filter(i=>i.status==="active").length;
  const used=myItems.filter(i=>i.status==="used").length;
  const transit=myItems.filter(i=>i.status==="transit").length;
  const pending=orders.filter(o=>o.status==="pending").length;

  // Expiry alerts
  const now=new Date();const soon=new Date();soon.setDate(soon.getDate()+120);
  const expiring=myItems.filter(i=>i.expDate&&i.status==="active"&&new Date(i.expDate)<=soon&&new Date(i.expDate)>=now);
  const expired=myItems.filter(i=>i.expDate&&new Date(i.expDate)<now&&i.status==="active");

  const hdr=document.createElement("div");hdr.style.cssText="margin-bottom:16px;padding-top:4px";
  hdr.innerHTML=`<div style="font-size:20px;font-weight:800;color:var(--text)">Dashboard</div><div style="font-size:13px;color:var(--muted)">Good to see you, ${profile.displayName?.split(" ")[0]||"there"}</div>`;
  content.appendChild(hdr);

  if(expired.length>0){
    const banner=document.createElement("div");banner.className="expiry-banner";
    banner.innerHTML=`<span style="font-size:20px">⚠️</span><span class="expiry-banner-text">${expired.length} item${expired.length>1?"s":""} expired</span>`;
    banner.onclick=()=>setState({tab:"inventory",inventorySearch:"__expired__"});
    content.appendChild(banner);
  }
  if(expiring.length>0){
    const banner=document.createElement("div");banner.className="expiry-banner";banner.style.cssText="background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);";
    banner.innerHTML=`<span style="font-size:20px">⏰</span><span style="font-size:13px;font-weight:600;color:var(--amber)">${expiring.length} item${expiring.length>1?"s":""} expiring within 120 days</span>`;
    content.appendChild(banner);
  }

  // Stats
  const grid=document.createElement("div");grid.className="stat-grid";
  [[active,"#22c55e","Active"],[used,"#f59e0b","Checked Out"],[transit,"#8b5cf6","In Transit"],[pending,"#0ea5e9","Orders"]].forEach(([num,color,label])=>{
    const c=document.createElement("div");c.className="stat-card";
    c.innerHTML=`<div class="stat-num" style="color:${color}">${num}</div><div class="stat-label">${label}</div>`;
    grid.appendChild(c);
  });
  content.appendChild(grid);

  // Quick actions
  const actHdr=document.createElement("div");actHdr.style.cssText="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px";actHdr.textContent="Quick Actions";content.appendChild(actHdr);
  const actGrid=document.createElement("div");actGrid.className="action-grid";
  const actions=[
    {icon:"📥",label:"Check In",  fn:()=>setState({tab:"scan",modal:null,scanMode:"checkin",scanning:true,scanHint:"Scan to check in"})},
    {icon:"📤",label:"Check Out", fn:()=>setState({tab:"scan",modal:null,scanMode:"checkout",scanning:true,scanHint:"Scan to check out"})},
    {icon:"🔄",label:"Transfer",  fn:()=>setState({tab:"scan",modal:null,scanMode:"transfer",scanning:true,scanHint:"Scan to transfer"})},
    {icon:"📦",label:"Multi-Scan",fn:()=>setState({multiMode:true,showMultiDetails:true})},
    {icon:"🚚",label:"New Order", fn:()=>setState({tab:"orders",showOrderItemScan:true,scanning:true,scanHint:"Scan items for order",orderItems:[]})},
    {icon:"📋",label:"Inventory", fn:()=>setState({tab:"inventory"})},
  ];
  actions.forEach(a=>{
    const btn=document.createElement("div");btn.className="action-btn";
    btn.innerHTML=`<span class="ab-icon">${a.icon}</span><span class="ab-label">${a.label}</span>`;
    btn.onclick=a.fn;actGrid.appendChild(btn);
  });
  content.appendChild(actGrid);

  // Recent activity
  if(log.length>0){
    const logHdr=document.createElement("div");logHdr.style.cssText="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px";logHdr.textContent="Recent Activity";content.appendChild(logHdr);
    const actionColors={CHECK_IN:"#22c55e",CHECK_OUT:"#f59e0b",TRANSFER:"#6366f1",ORDER_IN:"#0ea5e9",ORDER_OUT:"#a855f7",UNDO_CHECKOUT:"#94a3b8"};
    const actionIcons={CHECK_IN:"📥",CHECK_OUT:"📤",TRANSFER:"🔄",ORDER_IN:"📦",ORDER_OUT:"🚚",UNDO_CHECKOUT:"↩️"};
    log.slice(0,8).forEach(entry=>{
      const row=document.createElement("div");row.className="log-row";
      const icon=document.createElement("span");icon.style.cssText="font-size:18px;margin-top:2px";icon.textContent=actionIcons[entry.action]||"📋";
      const info=document.createElement("div");info.style.flex="1";
      const color=actionColors[entry.action]||"#94a3b8";
      let detail="";
      if(entry.from&&entry.to)detail=entry.from+" → "+entry.to;
      else if(entry.to)detail="→ "+entry.to;
      info.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:${color};font-weight:700;font-size:12px">${(entry.action||"").replace(/_/g," ")}</span><span style="color:var(--muted);font-size:10px">${formatDate(entry.ts)}</span></div><div style="color:var(--text);font-size:13px;font-weight:600;margin-top:2px">${entry.itemName||entry.barcode}</div>${detail?`<div style="color:var(--dim);font-size:12px;margin-top:1px">${detail}</div>`:""}<div style="color:var(--muted);font-size:11px;margin-top:1px">by ${entry.user}</div>`;
      row.appendChild(icon);row.appendChild(info);content.appendChild(row);
    });
  }
}

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function renderInventory(content){
  const{items,owners,profile}=S;
  const hdr=document.createElement("div");hdr.style.cssText="margin-bottom:12px;padding-top:4px";hdr.innerHTML=`<div style="font-size:20px;font-weight:800">Inventory</div>`;content.appendChild(hdr);

  // Owner filter (admin sees all, member sees their own)
  if(profile.role==="admin"&&owners.length>1){
    const sel=document.createElement("select");sel.className="mb8";sel.style.marginBottom="12px";
    sel.innerHTML=`<option value="">All locations</option>`+owners.map(o=>`<option value="${o.id}"${S.selectedOwner===o.id?" selected":""}>${o.name}</option>`).join("");
    sel.onchange=()=>setState({selectedOwner:sel.value});
    content.appendChild(sel);
  }

  // Search
  const sw=document.createElement("div");sw.className="search-wrap";
  sw.innerHTML=`<span class="search-icon">🔍</span><input id="inv-search" type="text" placeholder="Search items or barcodes…" value="${S.inventorySearch==="__expired__"?"":S.inventorySearch}"/>`;
  sw.querySelector("input").oninput=e=>setState({inventorySearch:e.target.value});
  content.appendChild(sw);

  // Filter items
  let filtered=items;
  if(profile.role!=="admin")filtered=filtered.filter(i=>i.ownerId===profile.ownerId);
  if(S.selectedOwner)filtered=filtered.filter(i=>i.ownerId===S.selectedOwner);
  if(S.inventorySearch==="__expired__"){
    filtered=filtered.filter(i=>i.expDate&&new Date(i.expDate)<new Date()&&i.status==="active");
  }else if(S.inventorySearch){
    const q=S.inventorySearch.toLowerCase();
    filtered=filtered.filter(i=>(i.name||"").toLowerCase().includes(q)||(i.barcode||"").toLowerCase().includes(q)||(i.type||"").toLowerCase().includes(q));
  }

  // Count row
  const countRow=document.createElement("div");countRow.style.cssText="font-size:12px;color:var(--muted);margin-bottom:8px";
  countRow.textContent=`${filtered.length} item${filtered.length!==1?"s":""}`;content.appendChild(countRow);

  if(filtered.length===0){
    const empty=document.createElement("div");empty.style.cssText="text-align:center;padding:40px 0;color:var(--muted);font-size:14px";
    empty.innerHTML=`<div style="font-size:40px;margin-bottom:12px">📦</div>${S.inventorySearch?"No items match your search":"No items yet — check some in!"}`;
    content.appendChild(empty);return;
  }

  filtered.forEach(item=>{
    const row=document.createElement("div");row.className="item-row";
    const ownerName=owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
    const statusClass={active:"status-active",used:"status-used",transit:"status-transit"}[item.status]||"status-active";
    const isExpired=item.expDate&&new Date(item.expDate)<new Date()&&item.status==="active";
    row.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="item-name">${item.name}${isExpired?` <span style="font-size:10px;color:var(--red);font-weight:700">EXPIRED</span>`:""}</div>
        <div class="item-meta">${ownerName}${item.type?` · ${item.type}`:""}${item.expDate?` · exp ${item.expDate.substring(0,10)}`:""}${item.usedBy?` · used by ${item.usedBy}`:""}</div>
        <div style="font-size:10px;color:var(--muted);font-family:monospace;margin-top:2px">${item.barcode}</div>
      </div>
      <span class="status-badge ${statusClass}">${item.status}</span>
    `;
    row.onclick=()=>setState({modal:{type:"item_detail",item}});
    content.appendChild(row);
  });
}

// ── SCAN PAGE ─────────────────────────────────────────────────────────────────
function renderScanPage(){
  stopScanner();
  const app=document.getElementById("app");app.innerHTML="";
  const page=document.createElement("div");page.className="scan-page";

  const hint=document.createElement("div");hint.className="scan-hint";
  if(S.showOrderItemScan)hint.textContent=`${S.orderItems.length} item${S.orderItems.length!==1?"s":""} scanned for order`;
  else if(S.showOrderQRScan)hint.textContent="Now scan the ORDER QR code";
  else if(S.showMultiScan)hint.textContent=`${S.multiCodes.length} code${S.multiCodes.length!==1?"s":""} scanned`;
  else hint.textContent=S.scanHint||"Point camera at QR code";
  page.appendChild(hint);

  const video=document.createElement("video");video.id="scan-video";video.className="scan-video";video.setAttribute("playsinline","");video.setAttribute("muted","");page.appendChild(video);
  const canvas=document.createElement("canvas");canvas.id="scan-canvas";canvas.className="scan-canvas";page.appendChild(canvas);
  const status=document.createElement("div");status.id="scan-status";status.className="scan-status";page.appendChild(status);

  // Manual input
  const mw=document.createElement("div");mw.className="scan-manual";
  const mi=document.createElement("input");mi.type="text";mi.placeholder="Or type code manually…";
  mi.onkeydown=e=>{if(e.key==="Enter"&&mi.value.trim()){handleScan(mi.value.trim());mi.value="";}};
  mw.appendChild(mi);page.appendChild(mw);

  // Close button
  const closeBtn=document.createElement("button");closeBtn.className="scan-close";closeBtn.textContent="✕";
  closeBtn.onclick=()=>{
    stopScanner();
    setState({
      scanning:false,scanMode:null,showOrderItemScan:false,showOrderQRScan:false,
      showMultiScan:false,activeOrder:null
    });
  };
  page.appendChild(closeBtn);

  // Order item scan — done button
  if(S.showOrderItemScan&&S.orderItems.length>0){
    const doneBtn=document.createElement("button");
    doneBtn.style.cssText="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap";
    doneBtn.textContent=`Done — ${S.orderItems.length} item${S.orderItems.length!==1?"s":""} →`;
    doneBtn.onclick=()=>{stopScanner();setState({showOrderItemScan:false,scanning:false,showOrderQRScan:true,scanning:true,scanHint:"Scan the ORDER QR code"});};
    page.appendChild(doneBtn);
  }

  // Multi-scan done button
  if(S.showMultiScan&&S.multiCodes.length>0){
    const doneBtn=document.createElement("button");
    doneBtn.style.cssText="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap";
    doneBtn.textContent=`Done — ${S.multiCodes.length} code${S.multiCodes.length!==1?"s":""} →`;
    doneBtn.onclick=()=>{stopScanner();setState({showMultiScan:false,scanning:false,showMultiConfirm:true});};
    page.appendChild(doneBtn);
  }

  app.appendChild(page);
  setTimeout(startScanner,100);
}

  inner.innerHTML+=`<div class="field"><label>Order Name</label><input id="order-name" type="text" placeholder="e.g. Shipment to Site A, June Restock…"/></div>`;

  // QR preview
  const qrCard=document.createElement("div");qrCard.className="card mb16";
  qrCard.innerHTML=`<div class="label">Order QR Code</div><div id="order-qr" style="background:#fff;padding:8px;border-radius:8px;display:inline-block;margin-top:4px"></div><div style="font-size:11px;color:var(--muted);margin-top:6px;font-family:monospace">${pendingOrderQR}</div>`;
  inner.appendChild(qrCard);
  setTimeout(()=>{
    const qrEl=document.getElementById("order-qr");
    if(qrEl&&window.QRCode)new window.QRCode(qrEl,{text:pendingOrderQR,width:100,height:100});
  },50);

  // Items list
  const itemsCard=document.createElement("div");itemsCard.className="card mb16";
  const poolOwner=owners.find(o=>o.id.toUpperCase()==="POOL")||owners[0];
  itemsCard.innerHTML=`<div class="label">${orderItems.length} Item${orderItems.length!==1?"s":""}</div>`;
  orderItems.forEach(barcode=>{
    const item=items.find(i=>i.barcode===barcode);
    const r=document.createElement("div");r.style.cssText="font-size:13px;color:var(--dim);padding:4px 0;border-bottom:1px solid var(--border)";
    r.textContent=item?item.name:barcode;itemsCard.appendChild(r);
  });
  inner.appendChild(itemsCard);

  const confirmBtn=document.createElement("button");confirmBtn.className="btn btn-primary";confirmBtn.textContent="🚚 Create Order";
  confirmBtn.onclick=()=>{
    const name=document.getElementById("order-name")?.value.trim();
    if(!name){showToast("Please enter an order name","warn");return;}
    submitCreateOrder(name,orderItems,pendingOrderQR);
  };
  inner.appendChild(confirmBtn);

  const printBtn=document.createElement("button");printBtn.className="btn btn-ghost";printBtn.textContent="🖨️ Print QR Label";
  printBtn.onclick=()=>{
    const pa=document.getElementById("print-area");
    pa.innerHTML=`<h2>Order QR</h2><div id="print-qr" style="margin:16px auto;display:inline-block;background:#fff;padding:8px"></div><p style="font-family:monospace;font-size:12px">${pendingOrderQR}</p>`;
    if(window.QRCode)new window.QRCode(document.getElementById("print-qr"),{text:pendingOrderQR,width:180,height:180});
    setTimeout(()=>window.print(),200);
  };
  inner.appendChild(printBtn);

  page.appendChild(inner);app.appendChild(page);
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function renderModal(){
  const{modal,owners,profile}=S;
  if(!modal)return null;

  function overlay(inner,center){
    const div=document.createElement("div");div.className=center?"overlay-center":"overlay";
    div.onclick=e=>{if(e.target===div)setState({modal:null});};
    div.appendChild(inner);return div;
  }
  function modalInner(){const d=document.createElement("div");d.className="overlay-inner";return d;}

  // ── Check In ──
  if(modal.type==="checkin"){
    const inner=modalInner();
    inner.innerHTML=`<div class="modal-title">Check In Item</div><div class="modal-sub">Barcode: <span style="font-family:monospace;color:var(--primary)">${modal.barcode}</span></div>`;
    let name="",type="",expDate="",ownerId=profile.role==="admin"?"":profile.ownerId;
    const fields=[
      {id:"ci-name",label:"Item Name",type:"text",placeholder:"e.g. N95 Mask",onInput:v=>{name=v;}},
      {id:"ci-type",label:"Category",type:"text",placeholder:"e.g. PPE, Equipment",onInput:v=>{type=v;}},
      {id:"ci-exp",label:"Expiry Date (optional)",type:"date",onInput:v=>{expDate=v;}},
    ];
    fields.forEach(f=>{
      const div=document.createElement("div");div.className="field";
      div.innerHTML=`<label>${f.label}</label><input id="${f.id}" type="${f.type}" placeholder="${f.placeholder||""}"/>`;
      div.querySelector("input").oninput=e=>f.onInput(e.target.value);inner.appendChild(div);
    });
    if(profile.role==="admin"){
      const sel=document.createElement("div");sel.className="field";
      sel.innerHTML=`<label>Location</label><select id="ci-owner">${owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join("")}</select>`;
      sel.querySelector("select").onchange=e=>{ownerId=e.target.value;};inner.appendChild(sel);
    }
    const btn=document.createElement("button");btn.className="btn btn-green";btn.textContent="✓ Check In";
    btn.onclick=()=>{
      name=document.getElementById("ci-name")?.value.trim();
      type=document.getElementById("ci-type")?.value.trim();
      expDate=document.getElementById("ci-exp")?.value;
      if(profile.role==="admin")ownerId=document.getElementById("ci-owner")?.value;
      if(!name){showToast("Please enter an item name","warn");return;}
      if(!ownerId){showToast("Please select a location","warn");return;}
      submitCheckin(modal.barcode,name,type,expDate,ownerId);
      setState({modal:null,scanning:S.activeOrder?true:false});
    };
    inner.appendChild(btn);
    const cancel=document.createElement("button");cancel.className="btn btn-ghost";cancel.textContent="Cancel";cancel.onclick=()=>setState({modal:null,scanning:S.scanMode?true:false});inner.appendChild(cancel);
    return overlay(inner);
  }

  // ── Check Out ──
  if(modal.type==="checkout"){
    const{item}=modal;const inner=modalInner();
    const ownerName=owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
    inner.innerHTML=`<div class="modal-title">Check Out</div><div class="modal-sub">${item.name} · ${ownerName}</div>`;
    const field=document.createElement("div");field.className="field";
    field.innerHTML=`<label>Used By / Reason</label><input id="co-user" type="text" placeholder="Who is using this item?"/>`;inner.appendChild(field);
    const btn=document.createElement("button");btn.className="btn btn-amber";btn.textContent="📤 Check Out";
    btn.onclick=()=>{
      const usedBy=document.getElementById("co-user")?.value.trim();
      if(!usedBy){showToast("Please enter who is using this","warn");return;}
      submitCheckout(item,usedBy);setState({modal:null,scanning:S.scanMode?true:false});
    };inner.appendChild(btn);
    const cancel=document.createElement("button");cancel.className="btn btn-ghost";cancel.textContent="Cancel";cancel.onclick=()=>setState({modal:null,scanning:S.scanMode?true:false});inner.appendChild(cancel);
    return overlay(inner);
  }

  // ── Transfer ──
  if(modal.type==="transfer"){
    const{item}=modal;const inner=modalInner();
    const fromName=owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
    inner.innerHTML=`<div class="modal-title">Transfer Item</div><div class="modal-sub">${item.name} · from ${fromName}</div>`;
    const availOwners=profile.role==="admin"?owners.filter(o=>o.id!==item.ownerId):owners.filter(o=>o.id===profile.ownerId&&o.id!==item.ownerId);
    if(availOwners.length===0){inner.innerHTML+=`<div style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">No other locations available</div>`;}
    else{
      const sel=document.createElement("div");sel.className="field";
      sel.innerHTML=`<label>Transfer To</label><select id="tr-owner">${availOwners.map(o=>`<option value="${o.id}">${o.name}</option>`).join("")}</select>`;inner.appendChild(sel);
      const btn=document.createElement("button");btn.className="btn btn-purple";btn.textContent="🔄 Transfer";
      btn.onclick=()=>{
        const toId=document.getElementById("tr-owner")?.value;
        submitTransfer(item,toId);setState({modal:null,scanning:S.scanMode?true:false});
      };inner.appendChild(btn);
    }
    const cancel=document.createElement("button");cancel.className="btn btn-ghost";cancel.textContent="Cancel";cancel.onclick=()=>setState({modal:null,scanning:S.scanMode?true:false});inner.appendChild(cancel);
    return overlay(inner);
  }

  // ── Receive Order ──
  if(modal.type==="receive_order"){
    const{order,barcodes}=modal;const inner=modalInner();
    inner.innerHTML=`<div class="modal-title">Receive Order</div><div class="modal-sub">${order.name} · ${barcodes.length} item${barcodes.length!==1?"s":""}</div>`;
    if(profile.role==="admin"){
      const sel=document.createElement("div");sel.className="field";
      sel.innerHTML=`<label>Deliver To</label><select id="ro-owner">${owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join("")}</select>`;inner.appendChild(sel);
    }
    const btn=document.createElement("button");btn.className="btn btn-green";btn.textContent="📦 Receive Order";
    btn.onclick=()=>{
      const toOwnerId=profile.role==="admin"?(document.getElementById("ro-owner")?.value||owners[0]?.id):profile.ownerId;
      submitReceiveOrder(order,barcodes,toOwnerId);
    };inner.appendChild(btn);
    const cancel=document.createElement("button");cancel.className="btn btn-ghost";cancel.textContent="Cancel";cancel.onclick=()=>setState({modal:null});inner.appendChild(cancel);
    return overlay(inner);
  }

  // ── Item Detail ──
  if(modal.type==="item_detail"){
    const{item}=modal;
    const page=document.createElement("div");page.className="full-page";
    const inner=document.createElement("div");inner.className="full-inner";
    const ownerName=owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
    const statusClass={active:"status-active",used:"status-used",transit:"status-transit"}[item.status]||"status-active";

    const topRow=document.createElement("div");topRow.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-top:8px";
    topRow.innerHTML=`<div><div style="font-size:20px;font-weight:800">${item.name}</div><div style="font-family:monospace;font-size:12px;color:var(--muted);margin-top:2px">${item.barcode}</div></div><span class="status-badge ${statusClass}" style="font-size:12px;padding:5px 12px">${item.status}</span>`;
    const xBtn=document.createElement("button");xBtn.style.cssText="background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-size:16px;border-radius:8px;padding:8px 12px;cursor:pointer;margin-left:8px;flex-shrink:0";xBtn.textContent="✕";xBtn.onclick=()=>setState({modal:null});
    topRow.querySelector("div").after(xBtn);// won't work cleanly, let me restructure
    inner.appendChild(topRow);

    // Status card
    const sc=document.createElement("div");sc.className="card mb16";
    sc.innerHTML=`<div class="label">Current Status</div><div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px">
      <div><div style="color:var(--muted);font-size:11px">Location</div><div style="font-weight:700">${ownerName}</div></div>
      <div><div style="color:var(--muted);font-size:11px">Category</div><div style="font-weight:700">${item.type||"—"}</div></div>
      <div><div style="color:var(--muted);font-size:11px">Expires</div><div style="font-weight:700">${item.expDate?item.expDate.substring(0,10):"—"}</div></div>
      ${item.usedBy?`<div><div style="color:var(--muted);font-size:11px">Used By</div><div style="font-weight:700">${item.usedBy}</div></div>`:""}
    </div>`;
    inner.appendChild(sc);

    // Actions
    const actDiv=document.createElement("div");actDiv.style.cssText="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap";
    if(item.status==="active"){
      if(profile.role==="admin"||item.ownerId===profile.ownerId){
        const coBtn=document.createElement("button");coBtn.className="btn btn-amber";coBtn.style.cssText+="flex:1;min-width:120px";coBtn.textContent="Check Out";
        coBtn.onclick=()=>setState({modal:{type:"checkout",item}});actDiv.appendChild(coBtn);
      }
      if(profile.role==="admin"||(owners.length>1&&item.ownerId!==profile.ownerId)){
        const trBtn=document.createElement("button");trBtn.className="btn btn-purple";trBtn.style.cssText+="flex:1;min-width:120px";trBtn.textContent="Transfer";
        trBtn.onclick=()=>setState({modal:{type:"transfer",item}});actDiv.appendChild(trBtn);
      }
    }
    if(item.status==="used"&&(profile.role==="admin"||item.ownerId===profile.ownerId)){
      const ucBtn=document.createElement("button");ucBtn.className="btn btn-blue";ucBtn.style.cssText+="flex:1";ucBtn.textContent="↩️ Undo Checkout";
      ucBtn.onclick=()=>{setState({modal:{type:"undo_checkout",item}});};actDiv.appendChild(ucBtn);
    }
    if(actDiv.children.length>0)inner.appendChild(actDiv);

    // History
    const itemLog=S.log.filter(l=>l.barcode===item.barcode);
    const logHdr=document.createElement("div");logHdr.className="label";logHdr.textContent=`Activity History (${itemLog.length} events)`;inner.appendChild(logHdr);
    if(itemLog.length===0){const e=document.createElement("div");e.style.cssText="color:var(--muted);font-size:13px;text-align:center;padding:20px 0";e.textContent="No activity recorded yet";inner.appendChild(e);}
    else{
      const actionColors={CHECK_IN:"#22c55e",CHECK_OUT:"#f59e0b",TRANSFER:"#6366f1",ORDER_IN:"#0ea5e9",ORDER_OUT:"#a855f7",UNDO_CHECKOUT:"#94a3b8"};
      const actionIcons={CHECK_IN:"📥",CHECK_OUT:"📤",TRANSFER:"🔄",ORDER_IN:"📦",ORDER_OUT:"🚚",UNDO_CHECKOUT:"↩️"};
      itemLog.forEach(entry=>{
        const row=document.createElement("div");row.className="log-row";
        const icon=document.createElement("span");icon.style.cssText="font-size:18px;margin-top:2px";icon.textContent=actionIcons[entry.action]||"📋";
        const info=document.createElement("div");info.style.flex="1";
        const color=actionColors[entry.action]||"#94a3b8";
        let detail="";if(entry.from&&entry.to)detail=entry.from+" → "+entry.to;else if(entry.to)detail="→ "+entry.to;
        info.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:${color};font-weight:700;font-size:12px">${(entry.action||"").replace(/_/g," ")}</span><span style="color:var(--muted);font-size:10px">${formatDate(entry.ts)}</span></div>${detail?`<div style="color:var(--dim);font-size:12px;margin-top:3px">${detail}</div>`:""}<div style="color:var(--muted);font-size:11px;margin-top:2px">by ${entry.user}</div>`;
        row.appendChild(icon);row.appendChild(info);inner.appendChild(row);
      });
    }
    const closeBtn=document.createElement("button");closeBtn.className="btn btn-ghost";closeBtn.style.marginTop="16px";closeBtn.textContent="Close";closeBtn.onclick=()=>setState({modal:null});inner.appendChild(closeBtn);
    page.appendChild(inner);return page;
  }

  // ── Undo Checkout Confirm ──
  if(modal.type==="undo_checkout"){
    const{item}=modal;const inner=modalInner();
    const lastCheckout=S.log.find(l=>l.barcode===item.barcode&&l.action==="CHECK_OUT");
    const prevLocation=lastCheckout?.from||"Pool";
    inner.innerHTML=`<div class="modal-title">Undo Checkout?</div><div class="modal-sub">${item.name} will be returned to: <strong style="color:var(--text)">${prevLocation}</strong></div>`;
    const btn=document.createElement("button");btn.className="btn btn-primary";btn.textContent="✓ Yes, Undo Checkout";
    btn.onclick=()=>{setState({modal:null});submitUndoCheckout(item);};inner.appendChild(btn);
    const cancel=document.createElement("button");cancel.className="btn btn-ghost";cancel.textContent="Cancel";cancel.onclick=()=>setState({modal:{type:"item_detail",item}});inner.appendChild(cancel);
    return overlay(inner);
  }

  // ── Manage Users ──
  if(modal.type==="manage_users"){
    const inner=modalInner();
    inner.innerHTML=`<div class="modal-title">Team Members</div><div class="modal-sub">${S.tenantUsers.length} member${S.tenantUsers.length!==1?"s":""}</div>`;
    S.tenantUsers.forEach(u=>{
      const r=document.createElement("div");r.style.cssText="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center";
      const ownerName=owners.find(o=>o.id===u.ownerId)?.name||u.ownerId||"—";
      r.innerHTML=`<div><div style="font-weight:700;font-size:14px">${u.displayName||u.email}</div><div style="font-size:12px;color:var(--muted)">${u.email} · ${ownerName}</div></div><span style="font-size:11px;font-weight:700;color:${u.role==="admin"?"var(--primary)":"var(--dim)"};text-transform:uppercase">${u.role}</span>`;
      inner.appendChild(r);
    });
    const closeBtn=document.createElement("button");closeBtn.className="btn btn-ghost";closeBtn.textContent="Close";closeBtn.onclick=()=>setState({modal:null});inner.appendChild(closeBtn);
    return overlay(inner);
  }

  // ── Manage Owners/Locations ──
  if(modal.type==="manage_owners"){
    const inner=modalInner();
    inner.innerHTML=`<div class="modal-title">Inventory Locations</div><div class="modal-sub">Add locations like warehouses, vehicles, or people</div>`;
    owners.forEach(o=>{
      const r=document.createElement("div");r.style.cssText="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center";
      r.innerHTML=`<span style="font-weight:600">${o.name}</span><span style="font-size:11px;color:var(--muted);text-transform:uppercase">${o.type||"location"}</span>`;
      inner.appendChild(r);
    });
    // Add new
    inner.innerHTML+=`<div style="margin-top:12px;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Add Location</div>`;
    const newField=document.createElement("div");newField.style.display="flex";newField.style.gap="8px";
    newField.innerHTML=`<input id="new-owner-name" type="text" placeholder="Location name" style="flex:1;padding:10px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text)"/>`;
    const addBtn=document.createElement("button");addBtn.style.cssText="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer;white-space:nowrap";addBtn.textContent="Add";
    addBtn.onclick=async()=>{
      const name=document.getElementById("new-owner-name")?.value.trim();
      if(!name){showToast("Enter a location name","warn");return;}
      const id=name.toUpperCase().replace(/\s+/g,"_");
      await window._setDoc(tCol("owners"),id,{name,type:"location"});
      showToast("✅ Location added");
      loadData();setState({modal:null});
    };
    newField.appendChild(addBtn);inner.appendChild(newField);
    const closeBtn=document.createElement("button");closeBtn.className="btn btn-ghost";closeBtn.style.marginTop="12px";closeBtn.textContent="Close";closeBtn.onclick=()=>setState({modal:null});inner.appendChild(closeBtn);
    return overlay(inner);
  }

  // ── Invite ──
  if(modal.type==="invite"){
    const inner=modalInner();
    inner.innerHTML=`<div class="modal-title">Invite Team Member</div><div class="modal-sub">Set the role and location, then share the link</div>`;
    const roleField=document.createElement("div");roleField.className="field";
    roleField.innerHTML=`<label>Role</label><select id="inv-role"><option value="member">Member</option><option value="admin">Admin</option></select>`;inner.appendChild(roleField);
    const ownerField=document.createElement("div");ownerField.className="field";
    ownerField.innerHTML=`<label>Assign to Location</label><select id="inv-owner">${owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join("")}</select>`;inner.appendChild(ownerField);
    const resultDiv=document.createElement("div");resultDiv.style.display="none";
    resultDiv.innerHTML=`<div style="background:var(--primary-glow);border:1px solid var(--primary);border-radius:8px;padding:12px 14px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:6px">Invite Link — share this:</div><div id="inv-link-text" style="font-size:12px;color:var(--text);word-break:break-all;font-family:monospace"></div></div>`;
    inner.appendChild(resultDiv);
    const genBtn=document.createElement("button");genBtn.className="btn btn-primary";genBtn.textContent="Generate Invite Link";
    genBtn.onclick=async()=>{
      const role=document.getElementById("inv-role")?.value;
      const ownerId=document.getElementById("inv-owner")?.value;
      const ownerName=owners.find(o=>o.id===ownerId)?.name||"";
      const tenantName=S.tenant?.name||"";
      const expiresAt=new Date(Date.now()+7*24*60*60*1000).toISOString();// 7 days
      genBtn.disabled=true;genBtn.textContent="Generating…";
      try{
        const code=await window._addDoc("invites",{
          tenantId:S.profile.tenantId,tenantName,role,ownerId,ownerName,
          createdBy:S.profile.displayName,createdAt:new Date().toISOString(),
          expiresAt,usedBy:null
        });
        const link=`${window.location.origin}${window.location.pathname}?invite=${code}`;
        const linkText=document.getElementById("inv-link-text");
        if(linkText)linkText.textContent=link;
        resultDiv.style.display="block";
        genBtn.textContent="✓ Link Generated";
        // Copy to clipboard
        try{await navigator.clipboard.writeText(link);showToast("✅ Invite link copied to clipboard!");}
        catch{showToast("Link generated — copy it above");}
      }catch(e){showToast("Failed: "+e.message,"err");genBtn.disabled=false;genBtn.textContent="Generate Invite Link";}
    };
    inner.appendChild(genBtn);
    const closeBtn=document.createElement("button");closeBtn.className="btn btn-ghost";closeBtn.style.marginTop="10px";closeBtn.textContent="Close";closeBtn.onclick=()=>setState({modal:null});inner.appendChild(closeBtn);
    return overlay(inner);
  }

  return null;
}

// ── AUTH ERROR MESSAGES ───────────────────────────────────────────────────────
function friendlyError(code){
  const map={
    "auth/invalid-email":"Please enter a valid email.",
    "auth/user-not-found":"No account found with that email.",
    "auth/wrong-password":"Incorrect password.",
    "auth/invalid-credential":"Incorrect email or password.",
    "auth/email-already-in-use":"An account with that email already exists.",
    "auth/weak-password":"Password must be at least 6 characters.",
    "auth/too-many-requests":"Too many attempts. Please wait and try again.",
    "auth/network-request-failed":"Network error. Check your connection.",
  };
  return map[code]||"Something went wrong. Please try again.";
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  render();
  const params=new URLSearchParams(window.location.search);
  const inviteCode=params.get("invite");
  if(inviteCode)S.inviteCode=inviteCode;

  await waitForFirebase();

  if(inviteCode){
    try{const inv=await window._getDoc("invites",inviteCode);if(inv&&!inv.usedBy)S.inviteData=inv;}catch(e){}
  }

  window._onAuth(async(user)=>{
    if(!user){setState({screen:"login",user:null,profile:null,tenant:null});return;}
    setState({user,screen:"loading"});
    let profile=null;
    try{profile=await window._getDoc("users",user.uid);}catch(e){console.error(e);}
    if(!profile){setState({screen:"signup"});return;}
    setState({profile});
    if(!profile.tenantId){setState({screen:S.inviteCode?"join-org":"org-setup"});return;}
    let tenant=null;
    try{tenant=await window._getDoc("tenants",profile.tenantId);}catch(e){console.error(e);}
    setState({tenant,screen:"app"});
    loadData();
  });
}

// Background sync every 60 seconds
setInterval(()=>{if(S.screen==="app"&&!S.loading)loadData();},60000);

if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
}

init();
</script>
