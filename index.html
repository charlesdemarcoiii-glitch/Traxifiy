function formatDate(ts){if(!ts)return"";try{const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;return new Date(ts).toLocaleString("en-US",{timeZone:tz,month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true});}catch(e){return ts;}}

// Human-readable action labels
const ACTION_LABELS={CHECK_IN:"Check In",CHECK_OUT:"Check Out",TRANSFER:"Transfer",ORDER_IN:"Order Received",ORDER_OUT:"Order Sent",UNDO_CHECKOUT:"Returned"};
const ACTION_ICONS={CHECK_IN:"📥",CHECK_OUT:"📤",TRANSFER:"🔄",ORDER_IN:"📦",ORDER_OUT:"🚚",UNDO_CHECKOUT:"↩️"};
function actionLabel(a){return ACTION_LABELS[a]||(a||"").replace(/_/g," ");}

// Custom confirm dialog — returns a Promise<bool>
function showConfirm(title,msg,confirmText="Delete",danger=true){
  return new Promise(resolve=>{
    const overlay=document.createElement("div");overlay.className="confirm-dialog";
    const box=document.createElement("div");box.className="confirm-box";
    box.innerHTML='<div style="font-size:28px;margin-bottom:12px">'+(danger?"⚠️":"❓")+'</div><div style="color:#f1f5f9;font-weight:700;font-size:16px;margin-bottom:8px">'+title+'</div><div style="color:#64748b;font-size:13px;margin-bottom:24px;line-height:1.5">'+msg+'</div>';
    const btnRow=document.createElement("div");btnRow.style.cssText="display:flex;gap:10px;";
    const cancelBtn=document.createElement("button");cancelBtn.style.cssText="flex:1;padding:12px;border-radius:9px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;";cancelBtn.textContent="Cancel";
    cancelBtn.onclick=()=>{overlay.remove();resolve(false);};
    const confirmBtn=document.createElement("button");confirmBtn.style.cssText="flex:1;padding:12px;border-radius:9px;border:none;background:"+(danger?"#dc2626":"#6366f1")+";color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;";confirmBtn.textContent=confirmText;
    confirmBtn.onclick=()=>{overlay.remove();resolve(true);};
    btnRow.appendChild(cancelBtn);btnRow.appendChild(confirmBtn);box.appendChild(btnRow);overlay.appendChild(box);document.body.appendChild(overlay);
  });
}

  const orgName=S.tenant?.name||"our team";
  const text="You've been invited to join "+orgName+" on Traxify — inventory tracking for teams.\n\nTap the link to create your account:";
  if(navigator.share){

    // Fallback: open mailto
    const subject=encodeURIComponent("You've been invited to join "+orgName+" on Traxify");
    const body=encodeURIComponent(text+"\n\n"+url);
    window.open("mailto:?subject="+subject+"&body="+body);
  }
}

function showToast(msg,type="ok"){if(S.toastTimer)clearTimeout(S.toastTimer);const t=setTimeout(()=>setState({toast:null,toastTimer:null}),3500);setState({toast:{msg,type},toastTimer:t});}
function getProfile(){return S.profile||{};}
function isAdmin(){return getProfile().role==="admin";}
async function loadData(){
  setState({loading:true});
  try{
    const [ownR,itmR,logR,usrR,ordR]=await Promise.allSettled([window.fsGetAll("owners"),window.fsGetAll("items"),window.fsGetAll("log"),window.fsGetAll("users"),window.fsGetAll("orders")]);
    const settR=await window.fsGetSettings();
    const invR=getProfile().role==="admin"?await window.fsGetTenantInvites(S.profile.tenantId).catch(()=>[]):[];
    const defaults={itemNames:[],descriptions:[]};
    const settings=settR?{itemNames:settR.itemNames||defaults.itemNames,descriptions:settR.descriptions||defaults.descriptions}:defaults;
    setState({
      owners:(ownR.status==="fulfilled"?ownR.value:[]).map(o=>({id:o._id,name:o.name,type:o.type})),
      items:(itmR.status==="fulfilled"?itmR.value:[]).map(i=>({barcode:i._id,name:i.name,type:i.type,expDate:i.expDate,ownerId:i.ownerId,status:i.status||"active",addedAt:i.addedAt,usedBy:i.usedBy||""})),
      log:(logR.status==="fulfilled"?logR.value:[]).map(l=>({ts:l.ts,action:l.action,barcode:l.barcode,itemName:l.itemName,from:l.from,to:l.to,user:l.user})).sort((a,b)=>new Date(b.ts)-new Date(a.ts)),
      users:(usrR.status==="fulfilled"?usrR.value:[]).map(u=>({username:u._id,displayName:u.displayName,email:u.email,role:u.role,ownerId:u.ownerId||""})),
      orders:(ordR.status==="fulfilled"?ordR.value:[]).map(o=>({id:o._id,name:o.name,count:o.count,createdBy:o.createdBy,createdAt:o.createdAt,status:o.status,items:o.items||""})),
      invites:invR.map(i=>({id:i._id,role:i.role,ownerId:i.ownerId,createdBy:i.createdBy,createdAt:i.createdAt,expiresAt:i.expiresAt,usedBy:i.usedBy||null,tenantId:i.tenantId})),
      settings,
      loading:false
    });
  }catch(e){console.error("Load failed:",e);showToast("Could not load data","err");setState({loading:false});}
}
async function addItem(item){await window.fsSet("items",item.barcode,item);}
async function updateItem(b,d){await window.fsUpdate("items",b,d);}
async function addLog(e){await window.fsAdd("log",e);}
async function addOrder(o){await window.fsSet("orders",o.id,o);}
async function updateOrder(id,d){await window.fsUpdate("orders",id,d);}
async function submitUndoCheckout(item){
  const now=new Date().toISOString();
  const itemLog=S.log.filter(l=>l.barcode===item.barcode);
  const ce=itemLog.find(l=>l.action==="CHECK_OUT");
  let ro=null;
  if(ce&&ce.from){const v=ce.from.trim().toLowerCase();ro=S.owners.find(o=>o.name.trim().toLowerCase()===v||o.id.trim().toLowerCase()===v);}
  if(!ro)ro=S.owners[0];
  setState({items:S.items.map(i=>i.barcode===item.barcode?{...i,status:"active",ownerId:ro.id,usedBy:""}:i)});
  showToast("\u21a9\ufe0f "+item.name+" returned to "+ro.name);
  updateItem(item.barcode,{status:"active",ownerId:ro.id,usedBy:""}).then(()=>addLog({ts:now,action:"UNDO_CHECKOUT",barcode:item.barcode,itemName:item.name,from:"USED",to:ro.name,user:getProfile().displayName})).catch(e=>showToast("Failed: "+e.message,"err"));
}
async function submitCheckin(barcode,name,type,expDate,ownerId){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===ownerId)?.name||ownerId;
  const orderRef=S.activeOrder?S.activeOrder.id:"";
  const newItem={barcode,name,type,expDate,ownerId,status:"active",addedAt:now,usedBy:""};
  setState({items:[...S.items,newItem]});
  addItem(newItem);
  addLog({ts:now,action:"CHECK_IN",barcode,itemName:name,from:orderRef,to:ownerName,user:getProfile().displayName});
}
async function submitMultiCheckin(targetOwner){
  const{multiDetails,multiCodes,owners}=S;
  setState({loading:true,showMultiConfirm:false});
  const pool=targetOwner||owners[0];
  const now=new Date().toISOString();
  try{
    for(const barcode of multiCodes){
      await addItem({barcode,name:multiDetails.name,type:multiDetails.type,expDate:multiDetails.expDate,ownerId:pool.id,status:"active",addedAt:now,usedBy:""});
      await addLog({ts:now,action:"CHECK_IN",barcode,itemName:multiDetails.name,from:"",to:pool.name,user:getProfile().displayName});
    }
    showToast("\u2705 "+multiCodes.length+" items checked in to "+pool.name);
    setState({multiMode:false,multiDetails:null,multiCodes:[],showMultiDetails:false,showMultiScan:false,showMultiConfirm:false,activeOrder:null,scanMode:null});
    await loadData();
  }catch(e){showToast("Write failed","err");setState({loading:false});}
}
async function submitCheckout(item){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,status:"used",ownerId:"USED",usedBy:getProfile().displayName}:i);
  setState({modal:null,loading:false,items:updatedItems});
  showToast("\ud83d\udce4 "+item.name+" \u2192 Used");
  updateItem(item.barcode,{ownerId:"USED",status:"used",usedBy:getProfile().displayName}).then(()=>addLog({ts:now,action:"CHECK_OUT",barcode:item.barcode,itemName:item.name,from:ownerName,to:"USED",user:getProfile().displayName})).catch(e=>showToast("Write failed: "+e.message,"err"));
}
async function submitTransfer(item,toOwnerId){
  const now=new Date().toISOString();
  const fromName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const toName=S.owners.find(o=>o.id===toOwnerId)?.name||toOwnerId;
  setState({modal:null,loading:false,items:S.items.map(i=>i.barcode===item.barcode?{...i,ownerId:toOwnerId}:i)});
  showToast("\ud83d\udd04 "+item.name+" \u2192 "+toName);
  updateItem(item.barcode,{ownerId:toOwnerId}).then(()=>addLog({ts:now,action:"TRANSFER",barcode:item.barcode,itemName:item.name,from:fromName,to:toName,user:getProfile().displayName})).catch(e=>console.error(e));
}
async function submitOrderCreate(orderQR,itemBarcodes,orderName){
  const now=new Date().toISOString();
  const newOrder={id:orderQR,name:orderName||orderQR,count:itemBarcodes.length,createdBy:getProfile().displayName,createdAt:now,status:"transit",items:itemBarcodes.join(",")};
  setState({loading:false,showOrderSummary:false,orderItems:[],pendingOrderQR:null,showOrderGen:false,orders:[...S.orders,newOrder],items:S.items.map(i=>itemBarcodes.includes(i.barcode)?{...i,status:"transit",ownerId:"TRANSIT"}:i)});
  showToast("\ud83d\udce6 Order created! "+itemBarcodes.length+" items in transit");
  try{await addOrder(newOrder);for(const b of itemBarcodes){await updateItem(b,{ownerId:"TRANSIT",status:"transit"});await addLog({ts:now,action:"ORDER_OUT",barcode:b,itemName:"",from:"",to:"TRANSIT",user:getProfile().displayName});}}catch(e){console.error(e);}
}
let orderReceiveInProgress=false;
async function submitOrderReceive(orderQR,toOwnerId){
  if(orderReceiveInProgress)return;orderReceiveInProgress=true;
  setState({modal:null,loading:true});
  const now=new Date().toISOString();
  const toName=S.owners.find(o=>o.id===toOwnerId)?.name||toOwnerId;
  try{
    const orderRow=S.orders.find(o=>o.id===orderQR);
    if(!orderRow){showToast("Order not found","err");setState({loading:false});orderReceiveInProgress=false;return;}
    const barcodes=(orderRow.items||"").split(",").filter(b=>b.trim());
    if(barcodes.length===0){showToast("No items in order","err");setState({loading:false});orderReceiveInProgress=false;return;}
    for(const b of barcodes){await updateItem(b,{ownerId:toOwnerId,status:"active"});await addLog({ts:now,action:"ORDER_IN",barcode:b,itemName:"",from:"TRANSIT",to:toName,user:getProfile().displayName});}
    await updateOrder(orderQR,{status:"received"});
    showToast("\u2705 "+barcodes.length+" items received into "+toName);
    await loadData();
  }catch(e){showToast("Failed: "+e.message,"err");setState({loading:false});}finally{orderReceiveInProgress=false;}
}

let scanStream=null,scanInterval=null;
function startScanner(){
  const video=document.getElementById("scan-video"),canvas=document.getElementById("scan-canvas"),status=document.getElementById("scan-status");
  if(!video||!canvas)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}})
    .then(stream=>{
      scanStream=stream;video.srcObject=stream;video.play();
      if(window.jsQR){
        if(status)status.textContent=S.scanHint||"Point camera at QR code";
        scanInterval=setInterval(()=>{
          if(video.readyState!==4)return;
          const size=Math.min(video.videoWidth,video.videoHeight)*0.8;
          const x=(video.videoWidth-size)/2,y=(video.videoHeight-size)/2;
          canvas.width=size;canvas.height=size;
          const ctx=canvas.getContext("2d");
          ctx.drawImage(video,x,y,size,size,0,0,size,size);
          const img=ctx.getImageData(0,0,size,size);
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
          if(code&&code.data)handleScan(code.data);
        },150);
      }else{if(status)status.textContent="Type code manually below";}
    })
    .catch(()=>{const s=document.getElementById("scan-status");if(s)s.textContent="Camera unavailable — type code below";});
}
function stopScanner(){clearInterval(scanInterval);scanInterval=null;if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
function handleScan(barcode){
  const{scanMode,activeOrder,items,multiCodes,showMultiScan}=S;
  stopScanner();
  if(S.showOrderItemScan){
    const item=items.find(i=>i.barcode===barcode);
    if(item){
      if(item.status==="used"){showToast("Item already used","warn");setState({scanning:true});return;}
      if(item.status==="transit"){showToast("Item already in transit","warn");setState({scanning:true});return;}
      if(S.orderItems.includes(barcode)){showToast("Already added to order","warn");setState({scanning:true});return;}
      haptic();const newItems=[...S.orderItems,barcode];setState({orderItems:newItems,scanning:true});showToast("📦 "+newItems.length+" item"+(newItems.length>1?"s":"")+" added to order");
    }else{showToast("Item not found — must be checked in first","err");setState({scanning:true});}
    return;
  }
  if(S.showOrderQRScan){
    if(S.orders.find(o=>o.id===barcode)){showToast("This QR is already an order","err");setState({scanning:true});return;}
    const existingItem=items.find(i=>i.barcode===barcode);
    if(existingItem&&existingItem.status==="active"&&!S.orderItems.includes(barcode)){showToast("This QR belongs to an active item","warn");setState({scanning:true});return;}
    haptic();setState({scanning:false,showOrderQRScan:false,pendingOrderQR:barcode,showOrderSummary:true});return;
  }
  if(showMultiScan){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked: "+barcode,"warn");setState({scanning:true});return;}
    if(multiCodes.includes(barcode)){showToast("Already scanned this code","warn");setState({scanning:true});return;}
    haptic();const newCodes=[...multiCodes,barcode];setState({multiCodes:newCodes,scanning:true});showToast("📦 Code "+newCodes.length+" scanned");return;
  }
  setState({scanning:false});
  if(scanMode==="order"&&!activeOrder){const order=S.orders.find(o=>o.id===barcode);if(!order){showToast("Order not found","err");return;}setState({activeOrder:order,scanning:true,scanHint:"Scan items to add to order"});showToast("📦 Order: "+order.name+" — scan items");return;}
  if(scanMode==="order"&&activeOrder){if(items.find(i=>i.barcode===barcode)){showToast("Already tracked","warn");setState({scanning:true});return;}setState({modal:{type:"checkin",barcode,orderMode:true}});return;}
  if(scanMode==="checkin"){if(items.find(i=>i.barcode===barcode)){showToast("Already tracked — item exists","warn");return;}haptic();setState({modal:{type:"checkin",barcode,orderMode:false}});return;}
  if(scanMode==="checkout"){const item=items.find(i=>i.barcode===barcode);if(!item){showToast("Item not found","err");return;}if(item.status==="used"){showToast("Already checked out","warn");return;}if(!isAdmin()&&item.ownerId!==getProfile().ownerId){showToast("You can only check out items in your own inventory","err");return;}haptic();setState({modal:{type:"checkout",item}});return;}
  if(scanMode==="transfer"){
    const order=S.orders.find(o=>o.id===barcode);
    if(order){if(order.status==="received"){showToast("Order already received","warn");return;}const barcodes=(order.items||"").split(",").filter(b=>b.trim());if(barcodes.length===0){showToast("Order has no items","warn");return;}setState({modal:{type:"receive_order",order,barcodes,toOwnerId:isAdmin()?"":getProfile().ownerId}});return;}
    const item=items.find(i=>i.barcode===barcode);
    if(!item){showToast("Item not found — check in first","err");return;}
    if(item.status==="used"){showToast("Item already used","warn");return;}
    if(item.status==="transit"){showToast("Item is in transit — receive the order instead","warn");return;}
    if(!isAdmin()&&item.ownerId===getProfile().ownerId){showToast("Item is already in your inventory","warn");return;}
    setState({modal:{type:"transfer",item}});
  }
}
function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="onclick")e.onclick=v;else if(k==="onchange")e.onchange=v;else if(k==="oninput")e.oninput=v;else if(k==="onkeydown")e.onkeydown=v;
    else if(k==="style")Object.assign(e.style,v);else if(k==="class")e.className=v;else e.setAttribute(k,v);
  }
  for(const c of children){if(c==null)continue;if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(c));else e.appendChild(c);}
  return e;
}

      card.innerHTML='<span style="font-size:20px;margin-top:2px">'+actionIcon(entry.action)+'</span><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span style="color:'+color+';font-weight:700;font-size:12px;flex-shrink:0">'+actionLabel(entry.action)+'</span><span style="color:#334155;font-size:11px;white-space:nowrap">'+(entry.ts?formatDate(entry.ts):"")+'</span></div><div style="color:#f1f5f9;font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(entry.itemName||entry.barcode||"")+'</div>'+detail+'<div style="color:#475569;font-size:11px;margin-top:2px">by '+(entry.user||"")+'</div></div>';

    });
  }
  wrap.appendChild(content);return wrap;
}

  const ib=document.createElement("button");ib.textContent="Install";ib.style.cssText="background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;";ib.onclick=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;banner.remove();});}};
  const db=document.createElement("button");db.textContent="Later";db.style.cssText="background:transparent;color:#64748b;border:1px solid #334155;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;";db.onclick=()=>banner.remove();
  btns.appendChild(ib);btns.appendChild(db);banner.appendChild(btns);document.body.appendChild(banner);
});
init();
</script>
</body>
</html>
